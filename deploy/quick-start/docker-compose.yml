services:
  mdplanner:
    image: ghcr.io/studiowebux/mdplanner:latest
    container_name: mdplanner
    ports:
      - "8003:8003"
    volumes:
      - ./data:/data
    restart: unless-stopped
    # environment:
    #   - MDPLANNER_CACHE=1
    #   - MDPLANNER_API_TOKEN=changeme
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://127.0.0.1:8003/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
