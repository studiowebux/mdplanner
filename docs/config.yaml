title: MD Planner
description: Markdown-based project management with directory storage.
base_url: https://mdplanner.dev
author: Studio Webux
theme: default
dark_mode: true
enable_search: true
enable_llms: true

changelog:
  enabled: true
  title: "Changelog"
  path: "changelog"
  rss_enabled: true
  repository: "https://github.com/studiowebux/mdplanner"

mcp:
  enabled: true
  spec_files:
    - "mcp/*.mcp.json"
  path: "mcp"

stale_warning:
  enabled: true
  threshold_days: 365
  show_update_date: true

social_links:
  - name: GitHub
    url: https://github.com/studiowebux/mdplanner
    icon: github
  - name: Discord
    url: https://discord.gg/BG5Erm9fNv
    icon: discord

footer:
  copyright: "2026 Studio Webux. GPL-3.0."
  links:
    - title: "Project"
      items:
        - text: "GitHub"
          url: "https://github.com/studiowebux/mdplanner"
        - text: "Issues"
          url: "https://github.com/studiowebux/mdplanner/issues"
        - text: "Releases"
          url: "https://github.com/studiowebux/mdplanner/releases"
    - title: "Community"
      items:
        - text: "Discord"
          url: "https://discord.gg/BG5Erm9fNv"
        - text: "Buy Me a Coffee"
          url: "https://buymeacoffee.com/studiowebux"
        - text: "GitHub Sponsors"
          url: "https://github.com/sponsors/studiowebux"
        - text: "Patreon"
          url: "https://patreon.com/studiowebux"

landing:
  enabled: true
  nav:
    - text: "Docs"
      url: "/getting-started/quick-start.html"
    - text: "GitHub"
      url: "https://github.com/studiowebux/mdplanner"
    - text: "Discord"
      url: "https://discord.gg/BG5Erm9fNv"
  hero:
    title: "Project management with plain markdown files"
    subtitle: "Modular project management built on markdown files you own."
    buttons:
      - text: "Get Started"
        url: "/getting-started/quick-start.html"
        primary: true
      - text: "View on GitHub"
        url: "https://github.com/studiowebux/mdplanner"
        primary: false
  features:
    title: "Features"
    items:
      - emoji: "~"
        title: "Markdown Storage"
        description: "One .md file per entity. Human-readable, git-trackable, portable."
      - emoji: "~"
        title: "MCP Server"
        description: "Full MCP server for Claude Code and any MCP-compatible AI client."
      - emoji: "~"
        title: "Modular Views"
        description: "Kanban, Gantt, goals, milestones, brainstorm, reflection, retrospectives, and more."
      - emoji: "~"
        title: "Strategy Tools"
        description: "SWOT, risk matrix, lean canvas, business model, MoSCoW, Eisenhower."
      - emoji: "~"
        title: "Team and CRM"
        description: "People, org chart, capacity planning, onboarding, meetings, CRM."
      - emoji: "~"
        title: "Billing and Finance"
        description: "Invoices, quotes, fundraising pipeline, revenue tracking."
      - emoji: "~"
        title: "Infrastructure"
        description: "Docker Compose ready, WebDAV, SSE, FTS, encrypted backup, local LLM."
      - emoji: "~"
        title: "Single Binary"
        description: "One executable, no runtime dependencies. Linux, macOS, Windows."
  links:
    title: "Resources"
    items:
      - icon: "github"
        title: "GitHub"
        description: "Source code and issues"
        url: "https://github.com/studiowebux/mdplanner"
      - icon: "discord"
        title: "Community"
        description: "Join the discussion"
        url: "https://discord.gg/BG5Erm9fNv"
  opensource:
    title: "Open Source"
    description: "GPL-3.0. Self-host with full control. Built by Studio Webux."
    links:
      - text: "GitHub Repository"
        url: "https://github.com/studiowebux/mdplanner"
      - text: "Releases"
        url: "https://github.com/studiowebux/mdplanner/releases"
